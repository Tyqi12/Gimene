<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini 2.0 Interface</title>
    <style>
        :root {
            --bg-main: #0e0e10;
            --bg-secondary: #171719;
            --text-primary: #e3e3e3;
            --text-secondary: #9ca3af;
            --accent-gradient: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
            --border-color: #333537;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Google Sans', Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        aside {
            width: 280px;
            background-color: var(--bg-secondary);
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
        }

        .new-chat {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #282a2c;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .new-chat:hover { background: #37393b; }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 40px 15%;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .greeting-screen {
            text-align: left;
            margin-top: 10vh;
        }

        .greeting-text {
            font-size: 48px;
            font-weight: 500;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Message Bubbles */
        .message {
            display: flex;
            gap: 20px;
            animation: fadeIn 0.4s ease;
        }

        .user-msg { justify-content: flex-end; }
        .user-msg .content {
            background: #2b2c2e;
            padding: 12px 20px;
            border-radius: 20px;
        }

        /* Floating Input Bar */
        .input-area {
            padding: 20px 15%;
            background: linear-gradient(transparent, var(--bg-main) 30%);
        }

        .input-container {
            background: #1e1f20;
            border-radius: 32px;
            padding: 8px 12px 8px 24px;
            display: flex;
            align-items: center;
            border: 1px solid transparent;
            transition: border 0.3s;
        }

        .input-container:focus-within {
            border-color: #4285f4;
            background: #28292a;
        }

        input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            padding: 12px 0;
            outline: none;
        }

        .icon-btn {
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            color: var(--text-secondary);
        }

        .icon-btn:hover { background: #37393b; color: white; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <aside>
        <div class="new-chat">
            <span>+</span> New Chat
        </div>
    </aside>

    <main>
        <div id="chat-history">
            <div class="greeting-screen" id="welcome">
                <h1 class="greeting-text">Hello, Gemini</h1>
                <p style="color: #888; margin-top: 8px; font-size: 18px;">How can I help you sparkle today?</p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-container">
                <input type="text" id="userInput" placeholder="Enter a prompt here...">
                <div class="icon-btn" onclick="sendMessage()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </div>
            </div>
            <p style="font-size: 11px; text-align: center; color: var(--text-secondary); margin-top: 12px;">
                Gemini may provide inaccurate info.
            </p>
        </div>
    </main>

    <script>
        function sendMessage() {
            const input = document.getElementById('userInput');
            const history = document.getElementById('chat-history');
            const welcome = document.getElementById('welcome');

            if (input.value.trim() === "") return;

            // Hide welcome screen on first message
            if (welcome) welcome.style.display = 'none';

            // Append User Message
            const userDiv = document.createElement('div');
            userDiv.className = 'message user-msg';
            userDiv.innerHTML = `<div class="content">${input.value}</div>`;
            history.appendChild(userDiv);

            // Fake "Gemini" thinking effect
            const aiDiv = document.createElement('div');
            aiDiv.className = 'message';
            aiDiv.innerHTML = `<div style="color: #4285f4; font-weight: bold;">G</div><div class="content">...</div>`;
            history.appendChild(aiDiv);

            input.value = "";
            history.scrollTop = history.scrollHeight;

            // Simulate response
            setTimeout(() => {
                aiDiv.querySelector('.content').innerText = "This is a realistic simulation of the Gemini interface. Your code is running perfectly.";
            }, 1500);
        }

        // Allow "Enter" key to send
        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
